name: Daily arXiv Papers

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      send_email:
        type: boolean
        default: true

permissions:
  contents: write
  pages: write

jobs:
  daily-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests arxiv openai resend jinja2

      - name: Fetch papers and AI summarize
        run: python papers/scripts/fetch_papers.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Generate daily HTML
        run: python papers/scripts/generate_daily_html.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./output
            publish_branch: main          # 这里改成 main 分支
            destination_dir: papers
            keep_files: false
      - name: Send email (optional)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.send_email)
        run: python papers/scripts/send_email.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}