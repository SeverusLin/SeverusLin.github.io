name: Daily ArXiv Papers

on:
  schedule:
    - cron: '0 8 * * *'          # 每天 UTC 8:00（北京时间 16:00）
  workflow_dispatch:              # 允许手动触发测试

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r papers/scripts/requirements.txt

      - name: Fetch and filter
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SEND_EMAIL: 'true'
        run: python papers/scripts/fetch_and_filter.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/index.html
          git diff --staged --quiet || (git commit -m "Update daily papers $(date +%Y-%m-%d)" && git push)