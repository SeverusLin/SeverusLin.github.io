name: Daily arXiv Papers

on:
  schedule:
    - cron: '0 3 * * *'   # UTC 3:00 = 北京时间 11:00
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send email notification?'
        type: boolean
        default: true

permissions:
  contents: write
  pages: write

jobs:
  daily-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests arxiv openai resend jinja2

      # 👇 新增步骤：获取星期几
      - name: Get day of week
        id: dow
        run: echo "DOW=$(date +%u)" >> $GITHUB_ENV

      # 👇 所有业务步骤都加上运行条件
      - name: Fetch papers and AI summarize
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && env.DOW < 6)
        run: python papers/scripts/fetch_papers.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Generate daily HTML
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && env.DOW < 6)
        run: python papers/scripts/generate_daily_html.py

      - name: Deploy to GitHub Pages
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && env.DOW < 6)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          destination_dir: papers
          keep_files: true

      - name: Send email (optional)
        if: (github.event_name == 'workflow_dispatch' && inputs.send_email) || (github.event_name == 'schedule' && env.DOW < 6)
        run: python papers/scripts/send_email.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}