name: Daily arXiv Papers

on:
  schedule:
    - cron: '0 3 * * *'   # 北京时间 11:00
  workflow_dispatch:
    inputs:
      send_email:
        description: '是否发送邮件？'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: papers    # 关键：指定工作目录

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SEND_EMAIL: ${{ github.event_name == 'schedule' && 'true' || inputs.send_email }}
        run: python scripts/fetch_and_send.py

      - name: Commit and push updates
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add papers/papers.html papers/analysis/
          git diff --staged --quiet || git commit -m "Update papers [skip ci]"
          git push