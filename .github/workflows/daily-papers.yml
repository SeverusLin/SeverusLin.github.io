name: Daily ArXiv Papers

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      send_email:
        description: '是否发送邮件'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r papers/scripts/requirements.txt
      - name: Fetch and filter
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SEND_EMAIL: ${{ github.event.inputs.send_email || 'true' }}
        run: python papers/scripts/fetch_and_filter.py
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/index.html
          git diff --staged --quiet || (git commit -m "Update daily papers $(date +%Y-%m-%d)" && git push)