name: Analyze Single arXiv Paper

on:
  workflow_dispatch:
    inputs:
      arxiv_id:
        required: true
        type: string

permissions:
  contents: write
  pages: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests arxiv openai jinja2

      - name: Analyze paper
        run: python papers/scripts/analyze_single.py ${{ inputs.arxiv_id }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deploy analysis to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          destination_dir: papers
          keep_files: false