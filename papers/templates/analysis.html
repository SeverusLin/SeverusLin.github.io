<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis of {{ title }}</title>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body { font-family: system-ui; max-width: 960px; margin: 2em auto; padding: 0 1em; line-height: 1.6; }
    h1 { font-size: 1.6em; }
    .meta { color: #555; margin-bottom: 1.5em; }
    .analysis { white-space: pre-wrap; background: #f9f9f9; padding: 1em; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <div class="meta">
    <p><strong>Authors:</strong> {{ authors }}</p>
    <p><strong>arXiv:</strong> <a href="{{ url }}" target="_blank">{{ url }}</a></p>
    <p><strong>Generated on:</strong> {{ date }}</p>
  </div>
  <h2>Abstract</h2>
  <p>{{ abstract }}</p>
  <h2>Detailed AI Analysis</h2>
  <div class="analysis">{{ analysis }}</div>
  <p><a href="index.html">← Back to daily papers</a></p>
</body>
</html>
