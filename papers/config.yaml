categories:
  - math.AG
  - math.CO
  - math.DG

keywords:
  - matroids
  - tropical geometry
  - Chern class
  - characteristic classes
  - realrooted

lookback_days: 1

ai:
  # base_url 保持不变
  base_url: "https://api.deepseek.com"
  # model 参数任选其一即可
  model: "deepseek-v4-flash" 
  # 可选：如果你在本地或服务器上有特定需求，可以增加超时设置，避免网络波动导致的失败
  token_limit: 1000   # AI 打分响应的最大 token 数

email:
  sender: "arXiv Daily <onboarding@resend.dev>"   # 替换为你的已验证域名
  subject: "arXiv Daily Papers"
  include_full_abstract: true

output:
  daily_html: "index.html"

# 关注论文列表，用于 AI 关联度评估
reference_papers:
  - id: "2409.05107"
    label: "Explicit formulas for the Hattori-Stong theorem and applications"    # 可选标签，展示时用
  - id: "2603.21680"
    label: "Inequalities for Chow Polynomials and Chern Numbers of Matroids"
