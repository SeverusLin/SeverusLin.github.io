  - tropical geometry
  - Chern class

lookback_days: 1

ai:
  # base_url 保持不变
  base_url: "https://api.deepseek.com"
  # model 参数任选其一即可
  model: "deepseek-v4-flash"  # 或者使用 "deepseek-v4-pro"
  # 可选：如果你在本地或服务器上有特定需求，可以增加超时设置，避免网络波动导致的失败
  timeout: 60

email:
  sender: "arXiv Daily <onboarding@resend.dev>"   # 替换为你的已验证域名
  subject: "arXiv Daily Papers"
  include_full_abstract: true

output:
  daily_html: "index.html"
  analysis_html: "analysis.html"