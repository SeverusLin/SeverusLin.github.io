<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>arXiv Daily Papers — 2026-04-30</title>
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <!-- 引入 marked 来渲染 Markdown 评分指南 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 960px; margin: 2em auto; padding: 0 1em; }
    .paper { margin-bottom: 2.5em; padding-bottom: 2em; border-bottom: 1px solid #ddd; }
    .title { font-size: 1.3em; font-weight: 600; margin: 0.2em 0; }
    .meta { color: #555; font-size: 0.95em; margin: 0.3em 0; }
    .category { font-weight: bold; margin: 0.3em 0; }
    .cross { color: #666; font-size: 0.9em; margin-left: 0.5em; }
    .abstract { color: #333; margin: 0.8em 0; }
    .relevance { background: #f5f8ff; padding: 1em; border-left: 4px solid #2c5f8a; margin: 1em 0; }
    .relevance h3 { margin-top: 0; font-size: 1.1em; }
    .ref-list { list-style: none; padding-left: 0; }
    .ref-list li { margin: 0.4em 0; }
    .score-badge { display: inline-block; min-width: 2em; text-align: center; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: white; }
    .score-0-3 { background: #c0392b; }
    .score-4-6 { background: #e67e22; }
    .score-7-8 { background: #2980b9; }
    .score-9-10 { background: #27ae60; }
    .na { background: #bdc3c7; }
    /* 评分指南渲染区域 */
    .scoring-guide-container {
      background: #f0f4f8;
      border: 1px solid #ccc;
      padding: 1em;
      margin-bottom: 2em;
      border-radius: 6px;
    }
    .scoring-guide-container h2 { margin-top: 0; }
    a { color: #005a9c; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>arXiv Daily Papers — 2026-04-30</h1>

  <!-- 只在顶部展示一次评分指南 -->
  
  <div class="scoring-guide-container">
    <h2>📊 AI Scoring by <a href="https://api-docs.deepseek.com/" target="_blank">DeepSeek-v4-flash</a></h2>
    <div id="scoring-guide-content" data-markdown="## How AI Scores Relevance (0–10)

- **0–2** ➤ Completely unrelated (different field)  
- **3–4** ➤ Weakly related (same broad area, but different subfield)  
- **5–6** ➤ Moderately related (shares some common concepts or techniques)  
- **7–8** ➤ Strongly related (same subfield, similar methods)  
- **9–10** ➤ Highly related (very close topic, potential overlap)

&gt; The AI evaluates **topic**, **methodology**, and **results** to assign the score."></div>
    <script>
      (function() {
        const md = document.getElementById('scoring-guide-content').getAttribute('data-markdown');
        document.getElementById('scoring-guide-content').innerHTML = marked.parse(md);
      })();
    </script>
  </div>
  

  
    
  
</body>
</html>
